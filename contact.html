<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="fonts.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeannie Han</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background:var(--bg);
    color:var(--text);
  }
  a { color:inherit; text-decoration:none; }

  .wrap {
    max-width:900px;
    margin:0 auto;
    padding:calc(var(--topbar-h) + var(--pad)) var(--pad-x) 120px;
  }
  .page-title {
    font-size:clamp(34px, 7vw, 96px);
    letter-spacing:-0.05em;
    color:var(--text);
    margin-bottom:40px;
  }
  .contact-list {
    display:flex;
    flex-direction:column;
    gap:22px;
    max-width:520px;
  }
  .contact-row {
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px solid rgba(111,107,103,0.18);
    padding-bottom:10px;
  }
  .contact-row .k { font-size:12px; letter-spacing:-0.02em; opacity:0.5; }
  .contact-row a, .contact-row .v {
    font-size:clamp(18px, 3vw, 28px);
    letter-spacing:-0.04em;
  }

  .grain {
    position:fixed; inset:0; z-index:9999; pointer-events:none;
    background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='160' height='160' filter='url(%23n)'/></svg>");
    background-size:160px 160px;
    opacity:0.14;
    mix-blend-mode:multiply;
  }
</style>
</head>
<body>
  <header class="topbar">
    <a class="name" href="index.html">Jeannie Han</a>
    <nav class="topbar-nav">
      <a href="archive.html">Work</a>
      <a href="projects/about.html">Information</a>
      <a href="mailto:jeanniehan10@gmail.com">Let's Connect!</a>
    </nav>
  </header>

  <div class="wrap">
    <h1 class="page-title">Contact</h1>
    <div class="contact-list">
      <div class="contact-row">
        <span class="k">Email</span>
        <a href="mailto:hello@jeanniehan.com">hello@jeanniehan.com</a>
      </div>
      <div class="contact-row">
        <span class="k">Instagram</span>
        <a href="#" target="_blank" rel="noopener">@jeanniehan</a>
      </div>
      <div class="contact-row">
        <span class="k">LinkedIn</span>
        <a href="#" target="_blank" rel="noopener">Jeannie Han</a>
      </div>
      <div class="contact-row">
        <span class="k">Location</span>
        <span class="v">New York / New Jersey</span>
      </div>
    </div>
  </div>

  <div class="grain"></div>
</body>
</html>
